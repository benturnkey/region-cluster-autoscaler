apiVersion: v1
kind: Service
metadata:
  name: cluster-autoscaler-provider
  labels:
    app: cluster-autoscaler-provider
    app.kubernetes.io/name: cluster-autoscaler-provider
spec:
  selector:
    app: cluster-autoscaler-provider
    app.kubernetes.io/name: cluster-autoscaler-provider
  ports:
    - name: grpc
      port: 8086
      targetPort: 8086
      protocol: TCP
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
