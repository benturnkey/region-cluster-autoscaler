name: CI

on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Containerfile"
      - "Makefile"
      - ".github/actions/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Containerfile"
      - "Makefile"
      - ".github/actions/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

env:
  GO_VERSION: "1.25.8"
  IMAGE_NAME: cluster-autoscaler-provider
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/cluster-autoscaler-provider

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum
      - uses: golangci/golangci-lint-action@v9
        with:
          args: --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum
      - name: Build
        run: go build -v ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum
      - name: Test
        run: go test -v -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage.out
        if: always()


  vulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: |
          "$(go env GOPATH)/bin/govulncheck" -json ./... | python3 scripts/filter_govulncheck.py \
            --allow GO-2025-3521 \
            --allow GO-2025-3547

  pr-image:
    name: Build and Push PR Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push PR image
        run: |
          docker buildx build \
            --build-arg VERSION=dev \
            --tag "${IMAGE_REPO}:pr-${{ github.event.pull_request.number }}" \
            --platform=linux/amd64 \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --push \
            -f Containerfile \
            .
